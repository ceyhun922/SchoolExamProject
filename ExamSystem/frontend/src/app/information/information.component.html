<div class="mt-4">
  <div class="row">
    <div class="col-md-6">
      <div class="form-floating mb-3">
        <input type="text" class="form-control" maxlength="3" placeholder="Kod" [(ngModel)]="model.lessonCode">
        <label>Dərsin Kodu</label>
      </div>

      <div class="form-floating mb-3">
        <input type="text" class="form-control" maxlength="30" placeholder="Dərs Adı" [(ngModel)]="model.lessonName">
        <label>Dərsin Adı</label>
      </div>
    </div>

    <div class="col-md-6">
      <div class="form-floating mb-3">
        <input type="number" class="form-control" placeholder="Sinif" [(ngModel)]="model.classNumber">
        <label>Sinif</label>
      </div>

      <div class="form-floating mb-3">
        <input type="text" class="form-control" maxlength="20" placeholder="Müəllim Adı" [(ngModel)]="model.teacherName">
        <label>Müəllim Adı</label>
      </div>

      <div class="form-floating">
        <input type="text" class="form-control" maxlength="20" placeholder="Müəllim Soyadı" [(ngModel)]="model.teacherSurname">
        <label>Müəllim Soyadı</label>
      </div>
    </div>

  </div>
</div>

<div class="d-flex justify-content-between mb-5 mt-4">
  <button style="visibility:hidden"></button>


      <button class="btn btn-outline-primary" (click)="goNext(stepper)">

    Tələbə Qeydiyyatına Keçit Et
  </button>
</div>
