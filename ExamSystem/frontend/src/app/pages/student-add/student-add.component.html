<h2>Şagird Əlavə Et</h2>

<form (ngSubmit)="save(studentForm)" #studentForm="ngForm">

  <div class="mt-4">
    <div class="container">
      <div class="row">

        <div class="col-md-6">

          <div class="form-floating mb-3">
            <input type="number"
                   class="form-control"
                   maxlength="5"
                   name="studentNumber"
                   required
                   [(ngModel)]="student.studentNumber">
            <label>Şagirdin Nömrəsi</label>
          </div>

          <div class="form-floating mb-3">
            <input type="text"
                   class="form-control"
                   maxlength="30"
                   name="firstName"
                   required
                   [(ngModel)]="student.firstName">
            <label>Adı</label>
          </div>

        </div>

        <div class="col-md-6">

          <div class="form-floating mb-3">
            <input type="text"
                   class="form-control"
                   maxlength="30"
                   name="lastName"
                   required
                   [(ngModel)]="student.lastName">
            <label>Soyadı</label>
          </div>

          <div class="form-floating mb-3">
            <input type="number"
                   class="form-control"
                   name="classNumber"
                   required
                   [(ngModel)]="student.classNumber">
            <label>Sinifi</label>
          </div>

        </div>

      </div>
    </div>

    <div class="d-flex justify-content-between mb-5 mt-4">
      <button style="visibility:hidden"></button>

      <button class="btn btn-outline-primary"
              type="submit"
              >
        Əlavə Et
      </button>
    </div>

  </div>

</form>
