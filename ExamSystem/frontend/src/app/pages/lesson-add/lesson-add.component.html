<h2>Dərs Əlavə Et</h2>

<form #lessonForm="ngForm" (ngSubmit)="save(lessonForm)">

  <div class="mt-4">
    <div class="container">
      <div class="row">

        <div class="col-md-6">

          <div class="form-floating mb-3">
            <input type="text"
                   class="form-control"
                   maxlength="3"
                   required
                   name="lessonCode"
                   ngModel
                   [(ngModel)]="lesson.lessonCode">
            <label>Dərsin Kodu</label>
          </div>

          <div class="form-floating mb-3">
            <input type="text"
                   class="form-control"
                   maxlength="30"
                   required
                   name="lessonName"
                   ngModel
                   [(ngModel)]="lesson.lessonName">
            <label>Dərsin Adı</label>
          </div>

        </div>

        <div class="col-md-6">

          <div class="form-floating mb-3">
            <input type="number"
                   class="form-control"
                   required
                   name="classNumber"
                   ngModel
                   [(ngModel)]="lesson.classNumber">
            <label>Sinif</label>
          </div>

          <div class="form-floating mb-3">
            <input type="text"
                   class="form-control"
                   maxlength="20"
                   required
                   name="teacherName"
                   ngModel
                   [(ngModel)]="lesson.teacherName">
            <label>Müəllim Adı</label>
          </div>

          <div class="form-floating mb-3">
            <input type="text"
                   class="form-control"
                   maxlength="20"
                   required
                   name="teacherSurname"
                   ngModel
                   [(ngModel)]="lesson.teacherSurname">
            <label>Müəllim Soyadı</label>
          </div>

        </div>

      </div>
    </div>

    <div class="d-flex justify-content-between mb-5 mt-4">
      <button style="visibility:hidden"></button>

      <button class="btn btn-outline-primary"
              type="submit">
        Əlavə Et
      </button>
    </div>
  </div>

</form>
